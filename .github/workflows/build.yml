name: Build mla_hook

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup NDK r25c (compatible with Dobby)
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Patch Dobby source for compatibility
        run: |
          # Add OSMemory include to os_arch_features.h
          sed -i '/#include "PlatformUnifiedInterface\/platform.h"/a #include "PlatformUnifiedInterface/osMemory.h"' \
            Dobby/common/os_arch_features.h
          # Fix ProcessRuntime.cc lambda comparison (member function vs member variable)
          sed -i 's/return (a.start() < b.start())/return (a.start < b.start)/' \
            Dobby/source/Backend/UserMode/PlatformUtil/Linux/ProcessRuntime.cc 2>/dev/null || true
          # Fix RuntimeModule: add load_address if missing
          sed -i 's/\/\/ push to vector$/module.load_address = module.base;\n        \/\/ push to vector/' \
            Dobby/source/Backend/UserMode/PlatformUtil/Linux/ProcessRuntime.cc 2>/dev/null || true

      - name: Cache Dobby build
        id: cache-dobby
        uses: actions/cache@v4
        with:
          path: mla_hook_module/prebuilt
          key: ${{ runner.os }}-dobby-v2-${{ hashFiles('Dobby/**') }}

      - name: Build Dobby (static)
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p Dobby/build/android
          cd Dobby/build/android
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DDOBBY_BUILD_EXAMPLE=OFF \
            -DDOBBY_BUILD_TEST=OFF \
            -DDOBBY_DEBUG=OFF
          make -j$(nproc) dobby_static

      - name: Copy prebuilt libdobby.a
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p mla_hook_module/prebuilt/arm64-v8a
          cp Dobby/build/android/libdobby.a mla_hook_module/prebuilt/arm64-v8a/

      - name: Build mla_hook with ndk-build
        run: |
          cd mla_hook_module
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmla_hook-arm64-v8a
          path: mla_hook_module/libs/arm64-v8a/libmla_hook.so
          if-no-files-found: error