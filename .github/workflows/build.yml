name: Build mla_hook

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Patch Dobby os_arch_features.h (OSMemory circular include)
        run: |
          python3 -c "
import re
with open('Dobby/common/os_arch_features.h', 'r') as f:
    content = f.read()

# Replace the android::make_memory_readable function body
# Replace OSMemory usage with direct syscalls
old = '''namespace android {
inline void make_memory_readable(void *address, size_t size) {
#if defined(ANDROID)
  auto page = (void *)ALIGN_FLOOR(address, OSMemory::PageSize());
  if (!OSMemory::SetPermission(page, OSMemory::PageSize(), kReadExecute)) {
    return;
  }
#endif
}
} // namespace android'''

new = '''namespace android {
inline void make_memory_readable(void *address, size_t size) {
#if defined(ANDROID)
  long page_size = sysconf(_SC_PAGESIZE);
  void *page = (void *)((uintptr_t)address & ~(page_size - 1));
  mprotect(page, page_size, PROT_READ | PROT_EXEC);
#endif
}
} // namespace android'''

content = content.replace(old, new)

# Add includes
content = '#include <unistd.h>\n#include <sys/mman.h>\n' + content

with open('Dobby/common/os_arch_features.h', 'w') as f:
    f.write(content)
print('Patched os_arch_features.h successfully')
"

      - name: Cache Dobby build
        id: cache-dobby
        uses: actions/cache@v4
        with:
          path: mla_hook_module/prebuilt
          key: ${{ runner.os }}-dobby-v2-${{ hashFiles('Dobby/**') }}

      - name: Build Dobby (static)
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p Dobby/build/android
          cd Dobby/build/android
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DDOBBY_BUILD_EXAMPLE=OFF \
            -DDOBBY_BUILD_TEST=OFF \
            -DDOBBY_DEBUG=OFF
          make -j$(nproc) dobby_static

      - name: Copy prebuilt libdobby.a
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p mla_hook_module/prebuilt/arm64-v8a
          cp Dobby/build/android/libdobby.a mla_hook_module/prebuilt/arm64-v8a/

      - name: Build mla_hook with ndk-build
        run: |
          cd mla_hook_module
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmla_hook-arm64-v8a
          path: mla_hook_module/libs/arm64-v8a/libmla_hook.so
          if-no-files-found: error