name: Build mla_hook

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Setup NDK r25c
        run: |
          wget -q https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q android-ndk-r25c-linux.zip
          echo "ANDROID_NDK_HOME=$PWD/android-ndk-r25c" >> $GITHUB_ENV

      - name: Patch Dobby os_arch_features.h
        run: |
          # Replace OSMemory references with direct syscalls
          sed -i 's|auto page = (void \*)ALIGN_FLOOR(address, OSMemory::PageSize());|long page_size = sysconf(_SC_PAGESIZE);void *page = (void *)((uintptr_t)address \& ~(page_size - 1));|' Dobby/common/os_arch_features.h
          sed -i 's|if (!OSMemory::SetPermission(page, OSMemory::PageSize(), kReadExecute)) {|mprotect(page, page_size, PROT_READ | PROT_EXEC);|' Dobby/common/os_arch_features.h
          sed -i '/^    return;$/d' Dobby/common/os_arch_features.h
          # Delete the extra } that was the if-block closer (the one before #endif)
          sed -i '/^  }$/{h;d}; /^#endif/{g;/^  }$/{z;d}}' Dobby/common/os_arch_features.h
          sed -i '1i #include <unistd.h>' Dobby/common/os_arch_features.h
          sed -i '2i #include <sys/mman.h>' Dobby/common/os_arch_features.h

      - name: Cache Dobby build
        id: cache-dobby
        uses: actions/cache@v4
        with:
          path: mla_hook_module/prebuilt
          key: ${{ runner.os }}-dobby-v2-${{ hashFiles('Dobby/**') }}

      - name: Build Dobby (static)
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p Dobby/build/android
          cd Dobby/build/android
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DDOBBY_BUILD_EXAMPLE=OFF \
            -DDOBBY_BUILD_TEST=OFF \
            -DDOBBY_DEBUG=OFF
          make -j$(nproc) dobby_static

      - name: Copy prebuilt libdobby.a
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p mla_hook_module/prebuilt/arm64-v8a
          cp Dobby/build/android/libdobby.a mla_hook_module/prebuilt/arm64-v8a/

      - name: Build mla_hook with ndk-build
        run: |
          cd mla_hook_module
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmla_hook-arm64-v8a
          path: mla_hook_module/libs/arm64-v8a/libmla_hook.so
          if-no-files-found: error