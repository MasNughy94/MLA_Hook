name: Build mla_hook

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout with submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26b
          link-to-sdk: true

      - name: Patch Dobby assembly for Clang 18+ (NDK r27)
        run: |
          sed -i 's/adrp TMP_REG_0, cdecl(common_closure_bridge_handler)@PAGE/adrp x17, cdecl(common_closure_bridge_handler)/' \
            Dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm
          sed -i 's/add TMP_REG_0, TMP_REG_0, cdecl(common_closure_bridge_handler)@PAGEOFF/add x17, x17, :lo12:cdecl(common_closure_bridge_handler)/' \
            Dobby/source/TrampolineBridge/ClosureTrampolineBridge/arm64/closure_bridge_arm64.asm

      - name: Cache Dobby build
        id: cache-dobby
        uses: actions/cache@v4
        with:
          path: mla_hook_module/prebuilt
          key: ${{ runner.os }}-dobby-v2-${{ hashFiles('Dobby/**') }}

      - name: Build Dobby (static)
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p Dobby/build/android
          cd Dobby/build/android
          cmake ../.. \
            -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_HOME/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DCMAKE_BUILD_TYPE=Release \
            -DDOBBY_BUILD_EXAMPLE=OFF \
            -DDOBBY_BUILD_TEST=OFF \
            -DDOBBY_DEBUG=OFF
          make -j$(nproc) dobby_static

      - name: Copy prebuilt libdobby.a
        if: steps.cache-dobby.outputs.cache-hit != 'true'
        run: |
          mkdir -p mla_hook_module/prebuilt/arm64-v8a
          cp Dobby/build/android/libdobby.a mla_hook_module/prebuilt/arm64-v8a/

      - name: Build mla_hook with ndk-build
        run: |
          cd mla_hook_module
          $ANDROID_NDK_HOME/ndk-build NDK_PROJECT_PATH=. APP_BUILD_SCRIPT=jni/Android.mk -j$(nproc)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: libmla_hook-arm64-v8a
          path: mla_hook_module/libs/arm64-v8a/libmla_hook.so
          if-no-files-found: error
